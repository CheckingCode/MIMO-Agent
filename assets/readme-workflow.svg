<svg width="960" height="260" viewBox="0 0 960 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MiMo workflow</title>
  <desc id="desc">A four step workflow from chat to tools to verification to recovery.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="960" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#ECFEFF"/>
    </linearGradient>
    <style>
      .sans { font-family: Inter, Segoe UI, Arial, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .step { animation: glow 4s ease-in-out infinite; }
      .s2 { animation-delay: .35s; }
      .s3 { animation-delay: .7s; }
      .s4 { animation-delay: 1.05s; }
      @keyframes glow { 0%, 100% { opacity: .86; } 50% { opacity: 1; } }
      @media (prefers-reduced-motion: reduce) { .step { animation: none; } }
    </style>
  </defs>
  <rect width="960" height="260" rx="24" fill="url(#panel)"/>
  <text x="54" y="56" class="sans" font-size="24" font-weight="800" fill="#0F172A">One loop, end to end</text>
  <text x="54" y="84" class="sans" font-size="15" fill="#475569">MiMo reads context, uses tools, verifies work, and hands off clearly when a task needs recovery.</text>

  <g class="step">
    <rect x="58" y="122" width="178" height="88" rx="14" fill="#DBEAFE" stroke="#93C5FD"/>
    <text x="82" y="154" class="sans" font-size="16" font-weight="800" fill="#1E3A8A">Chat</text>
    <text x="82" y="181" class="mono" font-size="12" fill="#1E40AF">prompt + context</text>
  </g>
  <path d="M246 166H306" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
  <path d="M298 158L306 166L298 174" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <g class="step s2">
    <rect x="318" y="122" width="178" height="88" rx="14" fill="#F3E8FF" stroke="#C084FC"/>
    <text x="342" y="154" class="sans" font-size="16" font-weight="800" fill="#581C87">Tools</text>
    <text x="342" y="181" class="mono" font-size="12" fill="#6B21A8">files + terminal</text>
  </g>
  <path d="M506 166H566" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
  <path d="M558 158L566 166L558 174" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <g class="step s3">
    <rect x="578" y="122" width="178" height="88" rx="14" fill="#DCFCE7" stroke="#86EFAC"/>
    <text x="602" y="154" class="sans" font-size="16" font-weight="800" fill="#14532D">Verify</text>
    <text x="602" y="181" class="mono" font-size="12" fill="#166534">tests + checks</text>
  </g>
  <path d="M766 166H826" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
  <path d="M818 158L826 166L818 174" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <g class="step s4">
    <rect x="838" y="122" width="64" height="88" rx="14" fill="#FEF3C7" stroke="#FBBF24"/>
    <text x="856" y="154" class="sans" font-size="16" font-weight="800" fill="#78350F">OK</text>
    <text x="856" y="181" class="mono" font-size="12" fill="#92400E">ship</text>
  </g>
</svg>
